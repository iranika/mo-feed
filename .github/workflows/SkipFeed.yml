name: Skip feed

on:
  workflow_dispatch:
  
concurrency:
  group: skip-feed-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: FedericoCarboni/setup-ffmpeg@v3
      - name: initialize git setting.
        run: |
          git config user.name "iranika"
          git config user.email "7370486+iranika@users.noreply.github.com"
      - name: Setup PowerShell module cache
        id: cacher
        uses: actions/cache@v4
        with:
          path: "~/.local/share/powershell/Modules"
          key: ${{ runner.os }}-psmodules-anglparse
      - name: install module
        if: steps.cacher.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module AngleParse
      - name: check update momoirocode 
        run: |
          pwsh ./mops/mops.ps1 -Debug -ForceCheck -SkipFeedGen
      - name: commit 4koma feed and imgage
        run: |
          git add 4koma/* 4komaData.json 4komaDataMin.js 4komaData.js
          if git diff --cached --quiet; then
            echo "No update."
            exit 0
          fi
          git commit -m "mops: find new update. skip feed gen."
          git push
      - name: download top image.
        run: |
          pwsh ./top/download.ps1
      - name: commit top image.
        run: |
          git add top/top.jpg top/top.webp
          if git diff --cached --quiet; then
            echo "No update top page."
            exit 0
          fi
          git commit -m "top:image was changed"
          pwsh ./top/update-feed.ps1
          git add top/feed.atom
          git commit -m "top:feed was updated"
          git push

